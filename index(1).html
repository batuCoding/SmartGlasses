<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Dede</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  body { display: flex; align-items: center; justify-content: center; padding: 3vh 3vw; }

  #start {
    background: #fff; color: #000; border: none; border-radius: 24px;
    padding: 6vh 10vw; font-size: 8vh; font-weight: 700; cursor: pointer;
  }

  #transcript-wrap {
    display: none; width: 100%; height: 100%;
    align-items: center; justify-content: center;
    text-align: center;
  }
  #transcript {
    width: 100%;
    font-weight: 600;
    line-height: 1.2;
    word-wrap: break-word;
    overflow-wrap: break-word;
    /* font-size set dynamically by JS */
  }
  .final { color: #fff; }
  .interim { color: #888; }

  #status {
    position: fixed; top: 12px; right: 12px;
    width: 14px; height: 14px; border-radius: 50%;
    background: #555; transition: background 0.2s;
  }
  #status.listening { background: #2ecc71; }
  #status.error { background: #e74c3c; }

  #hint {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    font-size: 2.2vh; color: #555;
  }
</style>
</head>
<body>

<button id="start">Başlat</button>

<div id="transcript-wrap">
  <div id="transcript"></div>
</div>

<div id="status"></div>
<div id="hint" style="display:none;">dokun: duraklat</div>

<script>
(() => {
  const startBtn = document.getElementById('start');
  const wrap = document.getElementById('transcript-wrap');
  const transcriptEl = document.getElementById('transcript');
  const statusEl = document.getElementById('status');
  const hintEl = document.getElementById('hint');

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    startBtn.textContent = 'Tarayıcı desteklenmiyor';
    startBtn.disabled = true;
    return;
  }

  let recognition = null;
  let shouldBeListening = false;
  let wakeLock = null;

  // --- Tunable behavior ---
  const MAX_CHARS = 250;
  const SILENCE_CLEAR_MS = 10000;
  const WATCHDOG_MS = 45000;
  const MAX_FONT_VH = 12;   // start big
  const MIN_FONT_VH = 3.5;  // floor so it stays readable

  let displayBuffer = '';
  let silenceTimer = null;
  let watchdogTimer = null;

  function setStatus(state) { statusEl.className = state || ''; }

  function trimToMaxChars(text) {
    if (text.length <= MAX_CHARS) return text;
    const cut = text.slice(text.length - MAX_CHARS);
    const spaceIdx = cut.indexOf(' ');
    return spaceIdx > 0 ? cut.slice(spaceIdx + 1) : cut;
  }

  // Binary-search the largest font size that fits within the wrap container.
  function fitText() {
    const containerH = wrap.clientHeight;
    const containerW = wrap.clientWidth;
    if (!containerH || !containerW) return;

    const vh = window.innerHeight / 100;
    let lo = MIN_FONT_VH, hi = MAX_FONT_VH;
    let best = MIN_FONT_VH;

    // Binary search to ~0.25vh precision
    for (let i = 0; i < 8; i++) {
      const mid = (lo + hi) / 2;
      transcriptEl.style.fontSize = (mid * vh) + 'px';
      // Force reflow
      const fitsH = transcriptEl.scrollHeight <= containerH;
      const fitsW = transcriptEl.scrollWidth <= containerW;
      if (fitsH && fitsW) {
        best = mid;
        lo = mid;
      } else {
        hi = mid;
      }
    }
    transcriptEl.style.fontSize = (best * vh) + 'px';
  }

  function render(interim) {
    transcriptEl.innerHTML =
      `<span class="final">${escapeHtml(displayBuffer)}</span>` +
      (interim ? ` <span class="interim">${escapeHtml(interim)}</span>` : '');
    fitText();
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function resetSilenceTimer() {
    if (silenceTimer) clearTimeout(silenceTimer);
    silenceTimer = setTimeout(() => {
      displayBuffer = '';
      render('');
    }, SILENCE_CLEAR_MS);
  }

  function buildRecognizer() {
    const r = new SR();
    r.lang = 'tr-TR';
    r.continuous = true;
    r.interimResults = true;
    r.maxAlternatives = 1;

    r.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const res = e.results[i];
        const text = res[0].transcript.trim();
        if (res.isFinal) {
          if (text) {
            displayBuffer = trimToMaxChars((displayBuffer ? displayBuffer + ' ' : '') + text);
          }
        } else {
          interim += text + ' ';
        }
      }
      resetSilenceTimer();
      render(interim.trim());
    };

    r.onerror = (e) => {
      console.warn('SR error:', e.error);
      if (e.error !== 'no-speech' && e.error !== 'aborted') {
        setStatus('error');
      }
    };

    r.onend = () => {
      setStatus('');
      if (shouldBeListening) {
        setTimeout(() => {
          if (!shouldBeListening) return;
          try {
            recognition.start();
            setStatus('listening');
          } catch (err) {
            recognition = buildRecognizer();
            try { recognition.start(); setStatus('listening'); } catch(_) { setStatus('error'); }
          }
        }, 100);
      }
    };

    r.onstart = () => setStatus('listening');

    return r;
  }

  function startWatchdog() {
    stopWatchdog();
    watchdogTimer = setInterval(() => {
      if (!shouldBeListening) return;
      try { recognition.stop(); } catch(_) {}
    }, WATCHDOG_MS);
  }
  function stopWatchdog() {
    if (watchdogTimer) { clearInterval(watchdogTimer); watchdogTimer = null; }
  }

  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch (err) { console.warn('Wake lock failed:', err); }
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && shouldBeListening) {
      requestWakeLock();
    }
  });

  // Refit text on rotation/resize
  window.addEventListener('resize', () => fitText());
  window.addEventListener('orientationchange', () => setTimeout(fitText, 200));

  function startListening() {
    shouldBeListening = true;
    recognition = buildRecognizer();
    try { recognition.start(); } catch (err) { console.warn(err); }
    requestWakeLock();
    startWatchdog();
    startBtn.style.display = 'none';
    wrap.style.display = 'flex';
    hintEl.style.display = 'block';
    render('');
  }

  function togglePause() {
    if (shouldBeListening) {
      shouldBeListening = false;
      stopWatchdog();
      if (recognition) { try { recognition.stop(); } catch(_) {} }
      hintEl.textContent = 'dokun: devam et';
    } else {
      shouldBeListening = true;
      recognition = buildRecognizer();
      try { recognition.start(); } catch(_) {}
      startWatchdog();
      hintEl.textContent = 'dokun: duraklat';
    }
  }

  startBtn.addEventListener('click', startListening);
  wrap.addEventListener('click', togglePause);
})();
</script>

</body>
</html>
